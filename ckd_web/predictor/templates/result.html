<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 text-center">

        <h2 class="mb-3">Prediction Result</h2>

        <h3 class="{% if probability > 70 %}text-danger{% elif probability > 40 %}text-warning{% else %}text-success{% endif %}">
            {{ result }}
        </h3>

        <p class="mt-3">
            Risk Probability: <strong>{{ probability }}%</strong>
        </p>

        {% if probability > 70 %}
            <div class="alert alert-danger mt-3">
                High Risk — Immediate medical consultation recommended
            </div>
        {% elif probability > 40 %}
            <div class="alert alert-warning mt-3">
                Moderate Risk — Further tests advised
            </div>
        {% else %}
            <div class="alert alert-success mt-3">
                Low Risk
            </div>
        {% endif %}

        <a href="/" class="btn btn-secondary mt-3">Try Again</a>

    </div>

</div>

</body>
</html>
